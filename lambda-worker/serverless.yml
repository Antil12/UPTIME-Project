
#
# After ALL workers are deployed, add to your backend .env:
#   LAMBDA_WORKERS_ACTIVE=true

service: uptime-region-checker

provider:
  name: aws
  runtime: nodejs20.x
  region: ${param:awsRegion, "ap-south-1"}
  memorySize: 256   # MB — sufficient for HTTP checks
  timeout: 60       # seconds (well under Lambda's 900s max)
  environment:
    BACKEND_API_URL: ${param:backendUrl}   # process.env.BACKEND_API_URL
    REGION: ${param:regionName}            # process.env.REGION  — must match MongoDB enum exactly
    LAMBDA_SECRET: ${param:lambdaSecret}   # process.env.LAMBDA_SECRET

functions:
  checker:
    handler: index.handler
    # Name includes region so multiple deploys don't overwrite each other
    name: uptime-checker-${param:regionName}
    description: "Uptime checker for ${param:regionName}"
    events:
      - schedule:
          rate: rate(2 minutes)   # fires every 2 minutes via EventBridge
          enabled: true

# Exclude dev/config files from the ZIP uploaded to AWS
package:
  patterns:
    - "!.gitignore"
    - "!serverless.yml"
    - "!*.md"
    - "!*.yml"
    - "!*.yaml"
    - "!.env*"
    - "!deploy.sh"