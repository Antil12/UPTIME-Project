# lambda-worker/serverless.yml
service: uptime-region-checker

provider:
  name: aws
  runtime: nodejs20.x
  region: ${param:awsRegion, "ap-south-1"}  # default: India (ap-south-1)
  memorySize: 256                             # MB — plenty for HTTP checks
  timeout: 60                                 # seconds (well under Lambda's 900s max)
  environment:
    # ⚠️  Env var names MUST match what index.js reads via process.env.*
    BACKEND_API_URL: ${param:backendUrl}      # process.env.BACKEND_API_URL
    REGION: ${param:regionName}               # process.env.REGION
    LAMBDA_SECRET: ${param:lambdaSecret}      # process.env.LAMBDA_SECRET

functions:
  checker:
    handler: index.handler
    name: uptime-checker-${param:regionName}
    description: "Uptime checker for ${param:regionName}"
    events:
      - schedule:
          rate: rate(2 minutes)
          enabled: true

# Serverless v3+ package syntax — exclude dev/config files from the ZIP
package:
  patterns:
    - "!.gitignore"
    - "!serverless.yml"
    - "!*.md"
    - "!*.yml"
    - "!*.yaml"
    - "!.env*"